name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build
        run: |
          make clean
          make

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Run POSIX core tests
        run: sh tests/posix-core/run.sh

  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: clang-format --dry-run --Werror src/*.c src/*.h

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential lcov

      - name: Run POSIX core tests with coverage instrumentation
        run: |
          CC=gcc CFLAGS="--coverage -O0 -g" LDFLAGS="--coverage" LMK_POSIX_TMP_ROOT=.coverage/posix-core LMK_POSIX_KEEP_TMP=1 sh tests/posix-core/run.sh

      - name: Collect coverage
        run: |
          lcov --capture --directory .coverage --output-file lcov.info
          lcov --remove lcov.info '*/tests/*' --output-file lcov.info
          lcov --list lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
